<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubingIndia - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
    <div class="card" style="width:380px">
        <div class="card-body p-4">
            <div class="text-center mb-3">
                <img src="/static/img/logo.jpg" alt="CubingIndia" height="48" class="rounded mb-2">
                <h5 class="mb-0">Dashboard Login</h5>
            </div>
            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small">Username</label>
                    <input type="text" class="form-control form-control-sm" name="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Password</label>
                    <input type="password" class="form-control form-control-sm" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-sm">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
